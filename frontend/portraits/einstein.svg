<svg viewBox="0 0 280 340" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="280" height="340" fill="#f0ebe0"/>

  <!-- Jacket/suit (rumpled brown tweed) -->
  <path d="M 0,340 L 0,268 C 50,246 95,238 140,236 C 185,238 230,246 280,268 L 280,340 Z" fill="#3a2c1a"/>
  <!-- Left lapel -->
  <path d="M 118,236 L 108,258 L 124,270 L 140,256 Z" fill="#4a3820" stroke="#2a1a08" stroke-width="0.5"/>
  <!-- Right lapel -->
  <path d="M 162,236 L 172,258 L 156,270 L 140,256 Z" fill="#4a3820" stroke="#2a1a08" stroke-width="0.5"/>
  <!-- Tie knot -->
  <path d="M 134,244 L 140,270 L 146,244 L 140,238 Z" fill="#6a4818"/>

  <!-- Neck -->
  <path d="M 126,220 L 124,238 Q 140,244 156,238 L 154,220 Q 145,225 135,220 Z" fill="#d4a870"/>

  <!-- Face oval (softer, rounder) -->
  <ellipse cx="140" cy="158" rx="74" ry="86" fill="#d4a870"/>

  <!-- Wild white hair — left puff -->
  <path d="M 66,100 C 52,76 54,50 68,36 C 80,22 96,18 108,24 C 98,38 90,60 84,82 C 78,96 70,110 66,128 Z" fill="#c8c0b0"/>
  <!-- Wild white hair — right puff -->
  <path d="M 214,100 C 228,76 226,50 212,36 C 200,22 184,18 172,24 C 182,38 190,60 196,82 C 202,96 210,110 214,128 Z" fill="#c8c0b0"/>
  <!-- Top hair — disheveled -->
  <path d="M 84,62 C 86,40 96,22 112,12 C 124,4 140,2 156,6 C 172,10 184,22 192,38 C 198,52 200,72 196,92 C 188,80 178,64 162,54 C 148,44 132,40 118,44 C 104,48 92,58 82,72 Z" fill="#c8c0b0"/>
  <!-- Flyaway strands left -->
  <path d="M 72,78 C 62,62 58,44 66,28" stroke="#b0a898" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 80,68 C 72,52 70,34 78,18" stroke="#b0a898" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Flyaway strands right -->
  <path d="M 208,78 C 218,62 222,44 214,28" stroke="#b0a898" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows (bushy white) -->
  <path d="M 102,142 C 110,136 120,134 130,135" stroke="#b0a898" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M 150,135 C 160,134 170,136 178,142" stroke="#b0a898" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Eyes (deep, soulful) -->
  <ellipse cx="120" cy="154" rx="12" ry="10" fill="white"/>
  <circle cx="120" cy="154" r="5.5" fill="#1a150f"/>
  <circle cx="122" cy="152" r="2" fill="white"/>
  <ellipse cx="160" cy="154" rx="12" ry="10" fill="white"/>
  <circle cx="160" cy="154" r="5.5" fill="#1a150f"/>
  <circle cx="162" cy="152" r="2" fill="white"/>

  <!-- Nose (rounded, bulbous) -->
  <path d="M 140,162 C 136,172 130,182 132,188 C 135,193 145,193 148,188 C 150,182 144,172 140,162 Z" fill="#c09060" opacity="0.6"/>

  <!-- Thick white mustache -->
  <path d="M 110,196 C 116,190 124,188 132,189 Q 140,190 148,189 C 156,188 164,190 170,196 C 164,202 154,204 140,203 C 126,204 116,202 110,196 Z" fill="#c8c0b0"/>
  <!-- Mustache shadow -->
  <path d="M 116,192 C 124,190 132,190 140,190 C 148,190 156,190 164,192" stroke="#a8a090" stroke-width="1" fill="none"/>

  <!-- Mouth -->
  <path d="M 122,208 Q 140,215 158,208" stroke="#c09060" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Wrinkles -->
  <path d="M 96,175 C 100,172 104,174 102,178" stroke="#b89060" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 184,175 C 180,172 176,174 178,178" stroke="#b89060" stroke-width="0.8" fill="none" opacity="0.5"/>

  <text x="140" y="328" font-family="monospace" font-size="9" fill="#7a5820" opacity="0.6" text-anchor="middle" letter-spacing="3">ALBERT EINSTEIN</text>
</svg>
