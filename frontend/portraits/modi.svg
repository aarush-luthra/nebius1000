<svg viewBox="0 0 280 340" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <rect width="280" height="340" fill="#f0ebe0"/>

  <!-- Clothing: dark Nehru jacket -->
  <path d="M 0,340 L 0,270 C 55,248 100,240 140,238 C 180,240 225,248 280,270 L 280,340 Z" fill="#1a1008"/>
  <!-- Nehru collar -->
  <path d="M 122,238 L 116,252 L 140,258 L 164,252 L 158,238 Q 148,244 140,244 Q 132,244 122,238 Z" fill="#2a1a08" stroke="#3a2a10" stroke-width="0.5"/>

  <!-- Neck -->
  <path d="M 128,222 L 126,240 Q 140,246 154,240 L 152,222 Q 144,226 136,222 Z" fill="#c8904e"/>

  <!-- White/grey beard - broad covering lower face -->
  <path d="M 78,185 C 70,202 68,228 76,248 C 86,264 108,270 130,271 Q 140,272 150,271 C 172,270 194,264 204,248 C 212,228 210,202 202,185 C 196,175 186,168 174,164" fill="#c4baa8" stroke="none"/>
  <!-- beard upper shadow -->
  <path d="M 104,172 C 116,176 128,178 140,178 C 152,178 164,176 176,172 C 172,184 162,192 140,194 C 118,192 108,184 104,172 Z" fill="#b0a890"/>

  <!-- Face oval -->
  <ellipse cx="140" cy="158" rx="72" ry="82" fill="#c8904e"/>
  <!-- Face highlight -->
  <ellipse cx="132" cy="138" rx="22" ry="28" fill="#d8a060" opacity="0.3"/>

  <!-- Dark hair (short, tight cap) -->
  <path d="M 78,140 C 76,108 90,82 112,70 C 124,64 136,62 148,62 C 168,64 188,76 200,96 C 210,114 212,138 208,158 C 200,148 192,132 178,118 C 164,104 152,98 140,98 C 128,98 116,104 104,116 C 90,130 82,148 78,158 Z" fill="#1a150f"/>
  <!-- Hair texture lines -->
  <path d="M 84,118 C 94,100 108,86 126,76" stroke="#2a2010" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 96,106 C 108,92 124,80 140,72" stroke="#2a2010" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Eyebrows (visible above glasses) -->
  <path d="M 108,136 C 114,132 122,130 130,131" stroke="#1a150f" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M 150,131 C 158,130 166,132 172,136" stroke="#1a150f" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="121" cy="146" rx="11" ry="9" fill="white"/>
  <circle cx="121" cy="146" r="5" fill="#1a150f"/>
  <circle cx="123" cy="144" r="1.5" fill="white"/>
  <ellipse cx="159" cy="146" rx="11" ry="9" fill="white"/>
  <circle cx="159" cy="146" r="5" fill="#1a150f"/>
  <circle cx="161" cy="144" r="1.5" fill="white"/>

  <!-- Glasses (thin rectangular frames) -->
  <rect x="106" y="135" width="30" height="22" rx="3" fill="none" stroke="#4a3020" stroke-width="1.4"/>
  <rect x="144" y="135" width="30" height="22" rx="3" fill="none" stroke="#4a3020" stroke-width="1.4"/>
  <line x1="136" y1="145" x2="144" y2="145" stroke="#4a3020" stroke-width="1.2"/>
  <line x1="106" y1="145" x2="88" y2="141" stroke="#4a3020" stroke-width="1"/>
  <line x1="174" y1="145" x2="192" y2="141" stroke="#4a3020" stroke-width="1"/>

  <!-- Nose -->
  <path d="M 140,158 Q 132,170 134,176 Q 140,179 146,176 Q 148,170 140,158" fill="#b87040" opacity="0.5"/>

  <!-- Mouth (under mustache area of beard) -->
  <path d="M 128,185 Q 140,191 152,185" stroke="#a06030" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Name watermark -->
  <text x="140" y="328" font-family="monospace" font-size="9" fill="#6a3a10" opacity="0.6" text-anchor="middle" letter-spacing="3">NARENDRA MODI</text>
</svg>
