<svg viewBox="0 0 280 340" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="280" height="340" fill="#f0ebe0"/>

  <!-- Dark suit -->
  <path d="M 0,340 L 0,268 C 55,248 98,240 140,238 C 182,240 225,248 280,268 L 280,340 Z" fill="#1a1e28"/>
  <!-- Left lapel -->
  <path d="M 118,238 L 106,262 L 126,274 L 140,258 Z" fill="#22283a" stroke="#0e1218" stroke-width="0.5"/>
  <!-- Right lapel -->
  <path d="M 162,238 L 174,262 L 154,274 L 140,258 Z" fill="#22283a" stroke="#0e1218" stroke-width="0.5"/>
  <!-- White shirt -->
  <path d="M 128,252 L 132,274 L 148,274 L 152,252 L 140,258 Z" fill="#e8e2d8"/>
  <!-- Long red tie (his signature) -->
  <path d="M 135,250 L 131,340 L 140,340 L 149,340 L 145,250 L 140,256 Z" fill="#8a1010"/>
  <path d="M 134,250 C 136,254 140,256 144,254 C 142,250 140,248 138,250 Z" fill="#6a0a0a"/>
  <!-- Tie knot -->
  <path d="M 134,250 L 140,258 L 146,250 L 140,246 Z" fill="#7a0e0e"/>
  <!-- American flag pin -->
  <rect x="123" y="256" width="8" height="5" rx="0" fill="#8a1010"/>
  <line x1="123" y1="258" x2="131" y2="258" stroke="white" stroke-width="0.8"/>
  <line x1="127" y1="256" x2="127" y2="261" stroke="white" stroke-width="0.8"/>

  <!-- Neck -->
  <path d="M 127,220 L 125,242 Q 140,248 155,242 L 153,220 Q 145,225 135,220 Z" fill="#d4956a"/>

  <!-- Face (full, strong) -->
  <ellipse cx="140" cy="156" rx="72" ry="84" fill="#d4956a"/>
  <ellipse cx="128" cy="136" rx="22" ry="28" fill="#dca070" opacity="0.3"/>

  <!-- ICONIC SWEPT GOLDEN-BLONDE HAIR -->
  <!-- Base — swept forward/right from back left -->
  <path d="M 72,120 C 68,88 76,58 92,38 C 100,26 112,16 124,12 C 110,22 98,40 92,60 C 86,80 84,108 84,132 Z" fill="#d4a030"/>
  <!-- Main swept mass — comes from left over forehead -->
  <path d="M 74,108 C 70,76 78,42 96,20 C 108,6 124,0 140,0 C 155,2 168,8 178,18 C 188,28 196,44 198,64 C 200,84 196,106 188,122 C 182,108 172,96 160,90 C 148,82 134,82 122,86 C 108,90 94,100 84,116 Z" fill="#c89828"/>
  <!-- The great swoop from left to right over forehead -->
  <path d="M 72,118 C 76,96 88,78 102,68 C 118,56 138,56 158,62 C 172,66 184,76 192,90 C 182,82 168,76 154,76 C 138,74 120,78 108,88 C 94,100 84,116 78,136 Z" fill="#d4a830"/>
  <!-- Forehead sweep highlight -->
  <path d="M 78,132 C 88,106 108,88 132,82 C 152,76 172,82 186,96 C 196,108 200,124 198,138 C 188,124 176,112 162,106 C 146,100 126,100 112,108 C 96,116 84,130 78,148 Z" fill="#e0b840"/>
  <!-- Side of hair staying up high -->
  <path d="M 78,150 C 76,164 78,178 82,188 C 86,198 90,202 92,200" stroke="#c89828" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Hair texture lines -->
  <path d="M 82,128 C 96,112 114,100 132,96" stroke="#b88820" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M 78,144 C 92,128 112,116 134,112" stroke="#b88820" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 80,158 C 94,144 116,132 138,128" stroke="#b88820" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Eyebrows (light, slight frown) -->
  <path d="M 106,138 C 112,133 120,132 128,133" stroke="#c09030" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 152,133 C 160,132 168,133 174,138" stroke="#c09030" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Slight furrow between brows -->
  <line x1="136" y1="132" x2="138" y2="138" stroke="#c09030" stroke-width="1" opacity="0.5"/>
  <line x1="144" y1="132" x2="142" y2="138" stroke="#c09030" stroke-width="1" opacity="0.5"/>

  <!-- Eyes (small, light, set deep) -->
  <ellipse cx="120" cy="150" rx="13" ry="10" fill="white"/>
  <circle cx="120" cy="150" r="5.5" fill="#4a6080"/>
  <circle cx="122" cy="148" r="2" fill="white"/>
  <ellipse cx="160" cy="150" rx="13" ry="10" fill="white"/>
  <circle cx="160" cy="150" r="5.5" fill="#4a6080"/>
  <circle cx="162" cy="148" r="2" fill="white"/>

  <!-- Nose (prominent, upturned slightly) -->
  <path d="M 140,158 C 134,172 130,186 134,194 C 137,198 143,198 146,194 C 150,186 146,172 140,158 Z" fill="#c08050" opacity="0.5"/>
  <!-- Nose bridge -->
  <line x1="140" y1="140" x2="140" y2="160" stroke="#c08050" stroke-width="1" opacity="0.3"/>

  <!-- Pursed / set mouth (strong expression) -->
  <path d="M 120,208 Q 130,205 140,206 Q 150,205 160,208" stroke="#a06030" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 118,208 Q 116,214 120,216" stroke="#a06030" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 162,208 Q 164,214 160,216" stroke="#a06030" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Jowl lines (distinctive) -->
  <path d="M 96,206 C 100,218 106,230 114,238" stroke="#c08050" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 184,206 C 180,218 174,230 166,238" stroke="#c08050" stroke-width="1" fill="none" opacity="0.3"/>

  <text x="140" y="328" font-family="monospace" font-size="9" fill="#6a1a1a" opacity="0.6" text-anchor="middle" letter-spacing="3">DONALD TRUMP</text>
</svg>
