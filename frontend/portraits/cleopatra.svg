<svg viewBox="0 0 280 340" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="280" height="340" fill="#f0ebe0"/>

  <!-- Gold jeweled collar necklace -->
  <path d="M 0,340 L 0,272 C 55,252 98,244 140,242 C 182,244 225,252 280,272 L 280,340 Z" fill="#d4a820"/>
  <!-- Collar top arc -->
  <path d="M 100,242 C 108,256 124,264 140,266 C 156,264 172,256 180,242" fill="#e8c030" stroke="#c09010" stroke-width="1"/>
  <!-- Collar gems -->
  <circle cx="110" cy="252" r="4" fill="#1a6040"/>
  <circle cx="124" cy="258" r="4" fill="#8a1010"/>
  <circle cx="140" cy="260" r="5" fill="#1a4080"/>
  <circle cx="156" cy="258" r="4" fill="#8a1010"/>
  <circle cx="170" cy="252" r="4" fill="#1a6040"/>
  <!-- Collar decorative lines -->
  <path d="M 102,246 C 120,254 160,254 178,246" stroke="#c09010" stroke-width="0.8" fill="none"/>

  <!-- Neck / chest white linen -->
  <path d="M 110,240 L 106,268 L 140,274 L 174,268 L 170,240" fill="#e8e0d0"/>

  <!-- Neck -->
  <path d="M 127,218 L 125,244 Q 140,250 155,244 L 153,218 Q 145,223 135,218 Z" fill="#d4a860"/>

  <!-- Face oval (elegant, Mediterranean) -->
  <ellipse cx="140" cy="154" rx="68" ry="82" fill="#d4a860"/>
  <ellipse cx="128" cy="136" rx="18" ry="24" fill="#deb870" opacity="0.4"/>

  <!-- NEMES HEADDRESS — striped cloth -->
  <!-- Main headdress body (wraps head) -->
  <path d="M 74,110 C 72,88 78,66 90,50 C 102,34 120,26 140,26 C 160,26 178,34 190,50 C 202,66 208,88 206,110 L 210,140 L 206,148 L 200,142 L 196,130 C 192,108 186,92 174,80 C 162,68 152,64 140,64 C 128,64 118,68 106,80 C 94,92 88,108 84,130 L 80,142 L 74,148 L 70,140 Z" fill="#e8d080" stroke="#c0a020" stroke-width="0.5"/>
  <!-- Headdress stripes (blue and gold alternating) -->
  <path d="M 76,100 C 82,96 98,90 140,88 C 182,90 198,96 204,100" stroke="#1a4080" stroke-width="4" fill="none"/>
  <path d="M 74,112 C 80,108 96,102 140,100 C 184,102 200,108 206,112" stroke="#c09010" stroke-width="4" fill="none"/>
  <path d="M 75,124 C 82,120 98,114 140,112 C 182,114 198,120 205,124" stroke="#1a4080" stroke-width="4" fill="none"/>
  <path d="M 78,136 C 85,132 100,126 140,124 C 180,126 195,132 202,136" stroke="#c09010" stroke-width="3" fill="none"/>
  <!-- Side flaps of headdress flowing down -->
  <path d="M 74,110 C 68,130 66,156 68,178 C 70,196 76,214 82,228" stroke="#e0c870" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 206,110 C 212,130 214,156 212,178 C 210,196 204,214 198,228" stroke="#e0c870" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Flap stripes -->
  <path d="M 70,122 C 66,142 64,164 66,182" stroke="#1a4080" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 73,130 C 69,150 67,172 69,190" stroke="#c09010" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 210,122 C 214,142 216,164 214,182" stroke="#1a4080" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 207,130 C 211,150 213,172 211,190" stroke="#c09010" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Uraeus (golden cobra at forehead) -->
  <path d="M 136,44 C 134,36 136,28 140,26 C 144,28 146,36 144,44" stroke="#d4a010" stroke-width="2" fill="#e8c020"/>
  <circle cx="140" cy="24" r="4" fill="#d4a010"/>

  <!-- Kohl-lined eyes (dramatic) -->
  <!-- Left eye kohl -->
  <path d="M 98,148 C 104,142 114,140 122,142 C 130,144 134,150 130,156 C 118,158 106,156 98,148 Z" fill="#1a150f"/>
  <ellipse cx="114" cy="149" rx="10" ry="8" fill="white"/>
  <circle cx="114" cy="149" r="5" fill="#1a2030"/>
  <circle cx="116" cy="147" r="1.8" fill="white"/>
  <!-- Left kohl wing -->
  <path d="M 98,148 C 90,145 84,148 82,152" stroke="#1a150f" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Right eye kohl -->
  <path d="M 182,148 C 176,142 166,140 158,142 C 150,144 146,150 150,156 C 162,158 174,156 182,148 Z" fill="#1a150f"/>
  <ellipse cx="166" cy="149" rx="10" ry="8" fill="white"/>
  <circle cx="166" cy="149" r="5" fill="#1a2030"/>
  <circle cx="168" cy="147" r="1.8" fill="white"/>
  <!-- Right kohl wing -->
  <path d="M 182,148 C 190,145 196,148 198,152" stroke="#1a150f" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows (arched, dark) -->
  <path d="M 100,138 C 108,132 118,130 126,131" stroke="#1a150f" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 154,131 C 162,130 172,132 180,138" stroke="#1a150f" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Nose (straight, elegant) -->
  <line x1="140" y1="158" x2="140" y2="184" stroke="#c09050" stroke-width="0.8" opacity="0.4"/>
  <path d="M 133,182 C 137,186 143,186 147,182" stroke="#c09050" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Mouth (full, composed) -->
  <path d="M 124,200 Q 132,196 140,197 Q 148,196 156,200" stroke="#a06030" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 124,200 Q 140,210 156,200" stroke="#a06030" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <text x="140" y="328" font-family="monospace" font-size="9" fill="#6a5010" opacity="0.6" text-anchor="middle" letter-spacing="3">CLEOPATRA VII</text>
</svg>
