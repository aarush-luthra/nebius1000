<svg viewBox="0 0 280 340" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="280" height="340" fill="#f0ebe0"/>

  <!-- Black frock coat -->
  <path d="M 0,340 L 0,268 C 55,248 98,240 140,238 C 182,240 225,248 280,268 L 280,340 Z" fill="#0e1018"/>
  <!-- High coat collar + white cravat -->
  <path d="M 116,238 L 112,262 L 140,274 L 168,262 L 164,238 Q 156,252 140,252 Q 124,252 116,238 Z" fill="#1a1828"/>
  <!-- White cravat / bow tie -->
  <path d="M 130,244 C 132,252 136,256 140,256 C 144,256 148,252 150,244 L 144,248 L 140,244 L 136,248 Z" fill="#e8e0d0"/>
  <!-- Cravat center knot -->
  <ellipse cx="140" cy="244" rx="5" ry="4" fill="#d8d0c0"/>
  <!-- White shirt collar points -->
  <path d="M 120,240 L 128,252" stroke="#e8e0d0" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M 160,240 L 152,252" stroke="#e8e0d0" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Neck -->
  <path d="M 128,218 L 126,242 Q 140,248 154,242 L 152,218 Q 144,223 136,218 Z" fill="#c89870"/>

  <!-- Face (narrow, angular, intense) -->
  <ellipse cx="140" cy="154" rx="66" ry="84" fill="#c89870"/>
  <!-- Narrow chin -->
  <path d="M 88,190 C 92,220 108,248 120,258 C 128,266 140,268 152,262 C 164,256 178,238 184,214 C 188,202 188,190 186,180" fill="#c89870" stroke="none"/>

  <!-- Center-parted slicked dark hair -->
  <!-- Left side — swept back tight -->
  <path d="M 84,128 C 80,100 84,72 96,52 C 106,34 120,24 134,22 C 122,36 112,58 108,82 C 104,102 106,124 110,144 Z" fill="#1a150f"/>
  <!-- Right side — swept back tight -->
  <path d="M 196,128 C 200,100 196,72 184,52 C 174,34 160,24 146,22 C 158,36 168,58 172,82 C 176,102 174,124 170,144 Z" fill="#1a150f"/>
  <!-- Top hair (center part, slicked) -->
  <path d="M 96,54 C 100,32 116,14 134,8 C 137,6 140,6 143,6 C 158,8 174,22 184,40 C 192,54 196,72 196,92 C 188,80 178,66 166,56 C 154,46 144,44 140,44 C 136,44 126,46 114,56 C 102,66 94,80 86,94 Z" fill="#1a150f"/>
  <!-- Center part line -->
  <line x1="140" y1="22" x2="140" y2="70" stroke="#2a2018" stroke-width="1.5" opacity="0.6"/>
  <!-- Hair waves (slicked back texture) -->
  <path d="M 88,110 C 96,100 106,94 114,92" stroke="#2a2018" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 192,110 C 184,100 174,94 166,92" stroke="#2a2018" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Intense eyebrows (sharp, dark) -->
  <path d="M 104,132 C 110,126 120,124 128,125" stroke="#1a150f" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 152,125 C 160,124 170,126 176,132" stroke="#1a150f" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Deep-set, intense eyes -->
  <!-- Eye sockets (slightly deeper) -->
  <ellipse cx="118" cy="146" rx="16" ry="12" fill="#b88860" opacity="0.4"/>
  <ellipse cx="162" cy="146" rx="16" ry="12" fill="#b88860" opacity="0.4"/>
  <ellipse cx="118" cy="146" rx="12" ry="10" fill="white"/>
  <circle cx="118" cy="146" r="5.5" fill="#1a1528"/>
  <circle cx="120" cy="144" r="1.8" fill="white"/>
  <ellipse cx="162" cy="146" rx="12" ry="10" fill="white"/>
  <circle cx="162" cy="146" r="5.5" fill="#1a1528"/>
  <circle cx="164" cy="144" r="1.8" fill="white"/>

  <!-- Thin dark mustache (his signature) -->
  <path d="M 118,184 C 124,178 130,176 136,177 Q 140,178 144,177 C 150,176 156,178 162,184 C 156,188 148,189 140,189 C 132,189 124,188 118,184 Z" fill="#1a150f"/>

  <!-- Nose (long, sharp) -->
  <path d="M 140,154 L 138,180 Q 140,183 142,180 Z" fill="#b88060" opacity="0.4"/>

  <!-- Thin composed mouth -->
  <path d="M 126,196 Q 140,200 154,196" stroke="#a07040" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Cheekbones (prominent) -->
  <path d="M 90,172 C 96,166 106,166 110,172" stroke="#a87048" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M 190,172 C 184,166 174,166 170,172" stroke="#a87048" stroke-width="0.8" fill="none" opacity="0.4"/>

  <text x="140" y="328" font-family="monospace" font-size="9" fill="#3a2a6a" opacity="0.6" text-anchor="middle" letter-spacing="3">NIKOLA TESLA</text>
</svg>
