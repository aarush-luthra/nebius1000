<svg viewBox="0 0 280 340" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="280" height="340" fill="#f0ebe0"/>

  <!-- Dark lab jacket / Victorian dress -->
  <path d="M 0,340 L 0,268 C 55,248 98,240 140,238 C 182,240 225,248 280,268 L 280,340 Z" fill="#1e2428"/>
  <!-- Left lapel -->
  <path d="M 118,238 L 106,264 L 128,274 L 140,258 Z" fill="#282e34" stroke="#12181c" stroke-width="0.5"/>
  <!-- Right lapel -->
  <path d="M 162,238 L 174,264 L 152,274 L 140,258 Z" fill="#282e34" stroke="#12181c" stroke-width="0.5"/>
  <!-- High white collar with lace -->
  <path d="M 120,240 L 116,260 L 140,268 L 164,260 L 160,240 Q 152,252 140,252 Q 128,252 120,240 Z" fill="#e8e2d8"/>
  <!-- Lace collar detail -->
  <path d="M 118,244 C 124,250 132,254 140,255 C 148,254 156,250 162,244" stroke="#d0c8b8" stroke-width="0.8" fill="none" opacity="0.8"/>
  <path d="M 120,250 C 126,255 133,258 140,259 C 147,258 154,255 160,250" stroke="#d0c8b8" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Small pearl button at collar -->
  <circle cx="140" cy="245" r="3" fill="#e8dcc8" stroke="#c8c0b0" stroke-width="0.5"/>

  <!-- Neck -->
  <path d="M 127,218 L 125,242 Q 140,248 155,242 L 153,218 Q 145,223 135,218 Z" fill="#c8906a"/>

  <!-- Face (determined, intellectual, oval) -->
  <ellipse cx="140" cy="155" rx="68" ry="82" fill="#c8906a"/>
  <ellipse cx="130" cy="136" rx="18" ry="22" fill="#d8a07a" opacity="0.35"/>

  <!-- DARK HAIR PULLED INTO BUN -->
  <!-- Main hair mass pulled back tight from face -->
  <path d="M 82,130 C 80,100 86,72 100,52 C 110,36 124,26 138,24 C 126,36 116,56 112,80 C 108,100 108,124 110,144 Z" fill="#2a2018"/>
  <path d="M 198,130 C 200,100 194,72 180,52 C 170,36 156,26 142,24 C 154,36 164,56 168,80 C 172,100 172,124 170,144 Z" fill="#2a2018"/>
  <!-- Top hair (center-parted, smoothed back) -->
  <path d="M 100,56 C 104,36 118,18 134,10 C 137,8 140,8 143,8 C 158,10 172,24 180,40 C 186,54 188,70 186,86 C 180,74 170,62 156,54 C 144,46 128,44 116,50 C 106,54 100,64 96,78 Z" fill="#2a2018"/>
  <!-- Center part line -->
  <line x1="140" y1="18" x2="140" y2="72" stroke="#1a1208" stroke-width="1.5" opacity="0.7"/>
  <!-- Smooth swept texture -->
  <path d="M 90,110 C 98,96 112,84 126,78" stroke="#1a1208" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 190,110 C 182,96 168,84 154,78" stroke="#1a1208" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Hair tucked behind ears, pulled to back -->
  <path d="M 82,132 C 80,150 80,170 84,190" stroke="#2a2018" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M 198,132 C 200,150 200,170 196,190" stroke="#2a2018" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- The BUN at top-back (slightly visible) -->
  <ellipse cx="140" cy="30" rx="28" ry="20" fill="#2a2018"/>
  <!-- Bun highlight -->
  <path d="M 118,26 C 124,20 132,18 140,18 C 148,18 156,20 162,26" stroke="#3a3028" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Bun pin/texture -->
  <path d="M 126,32 C 132,28 140,28 148,32" stroke="#1a1208" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- Eyebrows (serious, straight) -->
  <path d="M 108,134 C 114,130 122,128 130,129" stroke="#1a1208" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M 150,129 C 158,128 166,130 172,134" stroke="#1a1208" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Slight furrow (focused) -->
  <line x1="137" y1="129" x2="138" y2="133" stroke="#1a1208" stroke-width="1" opacity="0.4"/>
  <line x1="143" y1="129" x2="142" y2="133" stroke="#1a1208" stroke-width="1" opacity="0.4"/>

  <!-- Eyes (intelligent, steady) -->
  <ellipse cx="120" cy="146" rx="12" ry="10" fill="white"/>
  <circle cx="120" cy="146" r="5.5" fill="#2a3040"/>
  <circle cx="122" cy="144" r="2" fill="white"/>
  <ellipse cx="160" cy="146" rx="12" ry="10" fill="white"/>
  <circle cx="160" cy="146" r="5.5" fill="#2a3040"/>
  <circle cx="162" cy="144" r="2" fill="white"/>

  <!-- Nose (straight, elegant) -->
  <line x1="140" y1="154" x2="140" y2="180" stroke="#b08050" stroke-width="0.8" opacity="0.35"/>
  <path d="M 133,178 C 137,184 143,184 147,178" stroke="#b08050" stroke-width="1.2" fill="none" opacity="0.5"/>

  <!-- Composed, serious mouth -->
  <path d="M 124,196 Q 132,200 140,199 Q 148,200 156,196" stroke="#9a6040" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Slight set expression — not smiling but not frowning -->
  <path d="M 122,196 Q 120,200 122,203" stroke="#9a6040" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 158,196 Q 160,200 158,203" stroke="#9a6040" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Strong cheekbones -->
  <path d="M 96,170 C 100,164 108,164 112,170" stroke="#a87048" stroke-width="0.8" fill="none" opacity="0.35"/>
  <path d="M 184,170 C 180,164 172,164 168,170" stroke="#a87048" stroke-width="0.8" fill="none" opacity="0.35"/>

  <text x="140" y="328" font-family="monospace" font-size="9" fill="#0a4040" opacity="0.6" text-anchor="middle" letter-spacing="3">MARIE CURIE</text>
</svg>
