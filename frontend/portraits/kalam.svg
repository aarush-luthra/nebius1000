<svg viewBox="0 0 280 340" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="280" height="340" fill="#f0ebe0"/>

  <!-- White/cream kurta -->
  <path d="M 0,340 L 0,268 C 55,248 98,240 140,238 C 182,240 225,248 280,268 L 280,340 Z" fill="#e8e0d0"/>
  <!-- Kurta collar (band collar, white) -->
  <path d="M 124,238 L 120,252 L 140,256 L 160,252 L 156,238 Q 148,244 140,244 Q 132,244 124,238 Z" fill="#d8d0c0" stroke="#c0b8a8" stroke-width="0.5"/>
  <!-- Kurta center line -->
  <line x1="140" y1="248" x2="140" y2="340" stroke="#c8c0b0" stroke-width="0.8" opacity="0.5"/>

  <!-- Neck -->
  <path d="M 127,222 L 125,240 Q 140,246 155,240 L 153,222 Q 145,226 135,222 Z" fill="#c8906a"/>

  <!-- Face oval (round, kind) -->
  <ellipse cx="140" cy="158" rx="72" ry="84" fill="#c8906a"/>
  <ellipse cx="130" cy="138" rx="20" ry="26" fill="#d8a07a" opacity="0.4"/>

  <!-- Flowing white hair — LEFT side (his signature) -->
  <path d="M 68,120 C 56,90 60,58 74,38 C 62,54 56,80 60,108 C 62,122 68,138 76,152 C 70,142 66,132 68,120 Z" fill="#c8c0b0"/>
  <path d="M 75,88 C 68,68 70,46 82,30 C 74,46 70,68 72,92 C 74,108 80,126 88,142 Z" fill="#c8c0b0"/>
  <!-- Left hair flowing freely -->
  <path d="M 82,64 C 76,80 76,100 80,120 C 84,138 90,154 88,168" stroke="#b0a898" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M 76,80 C 68,96 66,118 70,138" stroke="#b8b0a0" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M 70,96 C 64,112 64,130 68,146" stroke="#c0b8a8" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Flowing white hair — RIGHT side -->
  <path d="M 212,120 C 224,90 220,58 206,38 C 218,54 224,80 220,108 C 218,122 212,138 204,152 C 210,142 214,132 212,120 Z" fill="#c8c0b0"/>
  <path d="M 198,64 C 204,80 204,100 200,120 C 196,138 190,154 192,168" stroke="#b0a898" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M 204,80 C 212,96 214,118 210,138" stroke="#b8b0a0" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Top of head — dark base (sparse on top) -->
  <path d="M 90,100 C 90,72 100,52 116,44 C 128,36 152,36 164,44 C 180,52 190,72 190,100 C 184,90 176,80 164,76 C 152,70 128,70 116,76 C 104,80 96,90 90,100 Z" fill="#3a3028"/>

  <!-- Eyebrows (gentle arching) -->
  <path d="M 108,138 C 114,134 122,132 130,133" stroke="#2a1a0a" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 150,133 C 158,132 166,134 172,138" stroke="#2a1a0a" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Eyes (warm, gentle) -->
  <ellipse cx="122" cy="150" rx="12" ry="10" fill="white"/>
  <circle cx="122" cy="150" r="5.5" fill="#1a150f"/>
  <circle cx="124" cy="148" r="2" fill="white"/>
  <ellipse cx="158" cy="150" rx="12" ry="10" fill="white"/>
  <circle cx="158" cy="150" r="5.5" fill="#1a150f"/>
  <circle cx="160" cy="148" r="2" fill="white"/>

  <!-- Smile lines (gentle) -->
  <path d="M 102,168 C 104,163 108,162 110,165" stroke="#a87050" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 178,168 C 176,163 172,162 170,165" stroke="#a87050" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Nose -->
  <path d="M 140,158 C 135,168 132,178 135,183 Q 140,186 145,183 C 148,178 145,168 140,158 Z" fill="#b87858" opacity="0.5"/>

  <!-- Warm smile -->
  <path d="M 122,196 Q 140,208 158,196" stroke="#a06040" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 120,196 Q 118,202 122,204" stroke="#a06040" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 160,196 Q 162,202 158,204" stroke="#a06040" stroke-width="1" fill="none" opacity="0.5"/>

  <text x="140" y="328" font-family="monospace" font-size="9" fill="#1a3a6a" opacity="0.6" text-anchor="middle" letter-spacing="3">APJ ABDUL KALAM</text>
</svg>
